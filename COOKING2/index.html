<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lucky Food Pots - Classroom Game</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Quicksand:wght@500;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background: url('home_bg.png') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden; /* Prevent scrolling */
            height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 1rem;
        }
        .header-font { font-family: 'Fredoka One', cursive; }
        
        .pot-card {
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            perspective: 1000px;
        }
        .pot-card:hover { transform: scale(1.05); }
        
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(5px);
        }

        .burnt-effect {
            filter: grayscale(1) brightness(0.2) contrast(1.5);
            transition: all 0.5s ease-in-out;
        }

        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        .animate-shake { animation: shake 0.5s; }

        .food-img {
            max-height: 200px;
            object-fit: contain;
        }
        
        .pot-img {
            width: 100%;
            height: auto;
            max-height: 60px;
            object-fit: contain;
        }

        /* Adjust grid to fit screen */
        #gameGrid {
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(4, 1fr);
            gap: 0.5rem;
            max-height: 65vh;
        }

        .score-board {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="p-2 md:p-4">

    <!-- Audio Element -->
    <audio id="bgMusic" src="music_bg.mp3" loop></audio>

    <!-- Score Board -->
    <div class="max-w-6xl mx-auto w-full flex justify-between items-center mb-4 score-board p-4 rounded-3xl shadow-xl border-4 border-yellow-400">
        <div id="teamASection" class="text-center px-4 py-2 rounded-2xl transition-all duration-300 bg-blue-100 border-b-4 border-blue-300">
            <h2 class="header-font text-xl text-blue-600">TEAM A</h2>
            <div id="scoreA" class="text-3xl font-bold text-blue-800">0</div>
        </div>

        <div class="text-center">
            <h1 class="header-font text-2xl text-orange-600 mb-1">LUCKY FOOD POTS</h1>
            <div class="flex items-center justify-center gap-4">
                <div id="turnIndicator" class="bg-orange-500 text-white px-4 py-1 rounded-full header-font text-sm animate-bounce">
                    TEAM A'S TURN
                </div>
                <button id="musicToggle" class="bg-gray-200 hover:bg-gray-300 p-2 rounded-full transition-colors" title="Toggle Music">
                    <span id="musicIcon">🔇</span>
                </button>
            </div>
            <div id="timerDisplay" class="text-lg font-bold text-gray-600">Time: 30s</div>
        </div>

        <div id="teamBSection" class="text-center px-4 py-2 rounded-2xl transition-all duration-300 bg-gray-50 opacity-50">
            <h2 class="header-font text-xl text-red-600">TEAM B</h2>
            <div id="scoreB" class="text-3xl font-bold text-red-800">0</div>
        </div>
    </div>

    <!-- Game Grid (Single Screen Layout) -->
    <div id="gameGrid" class="max-w-6xl mx-auto w-full px-2">
        <!-- Pots will be generated here -->
    </div>

    <!-- Modal for Reveal -->
    <div id="revealModal" class="fixed inset-0 modal-overlay z-50 hidden flex items-center justify-center p-4">
        <div class="bg-white rounded-3xl p-6 max-w-lg w-full text-center shadow-2xl transform transition-all">
            <h3 id="modalPotTitle" class="header-font text-xl mb-2 text-gray-500">POT #1</h3>
            
            <div class="relative bg-orange-50 rounded-2xl p-4 mb-4 min-h-[300px] flex flex-col items-center justify-center border-4 border-dashed border-orange-200">
                <div id="foodContent" class="text-center">
                    <div id="foodDisplayArea" class="mb-2">
                        <img id="foodImage" src="" alt="food" class="food-img mx-auto" onerror="this.style.display='none'; document.getElementById('foodFallback').style.display='block'">
                        <div id="foodFallback" class="text-8xl hidden">🍲</div>
                    </div>
                    
                    <div id="answerGroup" class="hidden">
                        <div id="foodLabel" class="header-font text-3xl text-orange-600 uppercase">FOOD NAME</div>
                        <div id="sentenceHint" class="mt-2 text-gray-500 text-lg italic">"Sentence hint..."</div>
                    </div>
                </div>
                
                <div id="burntOverlay" class="absolute inset-0 flex flex-col items-center justify-center bg-black bg-opacity-0 text-white rounded-xl transition-all duration-500 opacity-0 pointer-events-none">
                   <div class="text-7xl mb-2">🔥</div>
                   <div class="header-font text-4xl">OH NO! BURNT!</div>
                </div>
            </div>

            <div id="pointsDisplay" class="header-font text-3xl text-gray-400 mb-4">??? PTS</div>

            <div class="grid grid-cols-2 gap-3">
                <button id="btnReveal" class="bg-blue-500 hover:bg-blue-600 text-white header-font py-3 rounded-xl text-lg shadow-lg">
                    REVEAL STATUS
                </button>
                <button id="btnWrong" class="bg-red-500 hover:bg-red-600 text-white header-font py-3 rounded-xl text-lg shadow-lg">
                    WRONG / SKIP
                </button>
                <button id="btnNext" class="hidden col-span-2 bg-green-500 hover:bg-green-600 text-white header-font py-3 rounded-xl text-lg shadow-lg">
                    NEXT TURN
                </button>
            </div>
        </div>
    </div>

    <!-- Win Screen -->
    <div id="winScreen" class="fixed inset-0 modal-overlay z-[60] hidden flex flex-center items-center justify-center">
        <div class="bg-white rounded-3xl p-10 text-center shadow-2xl border-8 border-yellow-400">
            <div class="text-8xl mb-4">🏆</div>
            <h2 id="winMessage" class="header-font text-5xl text-orange-600 mb-6 font-black">TEAM A WINS!</h2>
            <button onclick="location.reload()" class="bg-orange-500 hover:bg-orange-600 text-white header-font px-10 py-3 rounded-full text-xl shadow-xl">
                PLAY AGAIN
            </button>
        </div>
    </div>

    <script>
        const gameData = {
            currentTeam: 'A',
            scores: { A: 0, B: 0 },
            pots: [],
            activePot: null,
            timer: 30,
            timerInterval: null,
            isRevealed: false,
            musicPlaying: false
        };

        const foods = [
            { name: 'bread', file: 'bread_picture.png', emoji: '🍞', hint: 'I see bread.' },
            { name: 'salad', file: 'salad_picture.png', emoji: '🥗', hint: 'It is salad.' },
            { name: 'noodles', file: 'noodles_picture.png', emoji: '🍜', hint: 'I see noodles.' },
            { name: 'soup', file: 'soup_picture.png', emoji: '🥣', hint: 'It is soup.' },
            { name: 'chicken', file: 'chicken_picture.png', emoji: '🍗', hint: 'I see chicken.' },
            { name: 'breakfast', emoji: '⏰ 07:00 AM', hint: 'It is breakfast time.' },
            { name: 'lunch', emoji: '⏰ 12:00 PM', hint: 'It is lunch time.' },
            { name: 'dinner', emoji: '⏰ 07:00 PM', hint: 'It is dinner time.' }
        ];

        const audio = document.getElementById('bgMusic');
        const musicToggle = document.getElementById('musicToggle');
        const musicIcon = document.getElementById('musicIcon');

        musicToggle.onclick = () => {
            if (gameData.musicPlaying) {
                audio.pause();
                musicIcon.innerText = '🔇';
            } else {
                audio.play().catch(e => console.log("Audio play blocked by browser"));
                musicIcon.innerText = '🔊';
            }
            gameData.musicPlaying = !gameData.musicPlaying;
        };

        function playSound(type) {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            const osc = ctx.createOscillator();
            const gain = ctx.createGain();
            osc.connect(gain);
            gain.connect(ctx.destination);

            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(1046.50, ctx.currentTime + 0.2);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            } else if (type === 'wrong') {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.linearRampToValueAtTime(100, ctx.currentTime + 0.3);
                gain.gain.setValueAtTime(0.05, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.3);
                osc.start();
                osc.stop(ctx.currentTime + 0.3);
            }
        }

        function initPots() {
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = '';
            for (let i = 1; i <= 20; i++) {
                const food = foods[Math.floor(Math.random() * foods.length)];
                const points = Math.floor(Math.random() * 10) * 100 + 100;
                const isBurnt = Math.random() < 0.3; 

                gameData.pots.push({ id: i, food, points, isBurnt, clicked: false });

                const pot = document.createElement('div');
                pot.id = `pot-${i}`;
                pot.className = 'pot-card bg-white/90 border-2 border-orange-300 rounded-xl p-2 flex flex-col items-center justify-center cursor-pointer shadow-md hover:border-orange-500';
                pot.innerHTML = `
                    <img src="pot_picture.png" class="pot-img" onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                    <div class="text-2xl hidden">🏺</div>
                    <div class="header-font text-xl text-orange-600">${i}</div>
                `;
                pot.onclick = () => openPot(i);
                grid.appendChild(pot);
            }
        }

        function startTimer() {
            clearInterval(gameData.timerInterval);
            gameData.timer = 30;
            document.getElementById('timerDisplay').innerText = `Time: ${gameData.timer}s`;
            gameData.timerInterval = setInterval(() => {
                gameData.timer--;
                document.getElementById('timerDisplay').innerText = `Time: ${gameData.timer}s`;
                if (gameData.timer <= 0) {
                    clearInterval(gameData.timerInterval);
                    handleWrong();
                }
            }, 1000);
        }

        function openPot(id) {
            const pot = gameData.pots.find(p => p.id === id);
            if (pot.clicked) return;
            
            gameData.activePot = pot;
            gameData.isRevealed = false;
            
            document.getElementById('modalPotTitle').innerText = `POT #${id}`;
            const imgEl = document.getElementById('foodImage');
            const fallbackEl = document.getElementById('foodFallback');
            
            if (pot.food.file) {
                imgEl.src = pot.food.file;
                imgEl.style.display = 'block';
                fallbackEl.style.display = 'none';
            } else {
                imgEl.style.display = 'none';
                fallbackEl.style.display = 'block';
                fallbackEl.innerText = pot.food.emoji;
            }

            document.getElementById('foodLabel').innerText = pot.food.name;
            document.getElementById('sentenceHint').innerText = pot.food.hint;
            
            document.getElementById('answerGroup').classList.add('hidden');
            document.getElementById('pointsDisplay').innerText = `??? PTS`;
            document.getElementById('pointsDisplay').className = 'header-font text-3xl text-gray-400 mb-4';
            
            document.getElementById('foodContent').classList.remove('burnt-effect', 'animate-shake');
            document.getElementById('burntOverlay').classList.add('opacity-0');
            document.getElementById('burntOverlay').classList.remove('opacity-100');
            document.getElementById('btnReveal').classList.remove('hidden');
            document.getElementById('btnWrong').classList.remove('hidden');
            document.getElementById('btnNext').classList.add('hidden');
            
            document.getElementById('revealModal').classList.remove('hidden');
            startTimer();
        }

        function revealStatus() {
            clearInterval(gameData.timerInterval);
            const pot = gameData.activePot;
            gameData.isRevealed = true;
            
            document.getElementById('answerGroup').classList.remove('hidden');

            if (pot.isBurnt) {
                playSound('wrong');
                document.getElementById('foodContent').classList.add('burnt-effect', 'animate-shake');
                document.getElementById('burntOverlay').classList.remove('opacity-0');
                document.getElementById('burntOverlay').classList.add('opacity-100', 'bg-opacity-60');
                document.getElementById('pointsDisplay').innerText = `-${pot.points} PTS`;
                document.getElementById('pointsDisplay').className = 'header-font text-3xl text-red-600 mb-4';
                gameData.scores[gameData.currentTeam] -= pot.points;
            } else {
                playSound('correct');
                document.getElementById('pointsDisplay').innerText = `+${pot.points} PTS`;
                document.getElementById('pointsDisplay').className = 'header-font text-3xl text-green-600 mb-4';
                gameData.scores[gameData.currentTeam] += pot.points;
            }

            updateScores();
            pot.clicked = true;
            document.getElementById(`pot-${pot.id}`).style.opacity = '0.4';
            document.getElementById(`pot-${pot.id}`).classList.add('grayscale');
            
            document.getElementById('btnReveal').classList.add('hidden');
            document.getElementById('btnWrong').classList.add('hidden');
            document.getElementById('btnNext').classList.remove('hidden');

            checkWin();
        }

        function handleWrong() {
            clearInterval(gameData.timerInterval);
            playSound('wrong');
            nextTurn();
        }

        function nextTurn() {
            gameData.currentTeam = gameData.currentTeam === 'A' ? 'B' : 'A';
            const indicator = document.getElementById('turnIndicator');
            indicator.innerText = `TEAM ${gameData.currentTeam}'S TURN`;
            
            if (gameData.currentTeam === 'A') {
                document.getElementById('teamASection').className = 'text-center px-4 py-2 rounded-2xl transition-all duration-300 bg-blue-100 border-b-4 border-blue-300';
                document.getElementById('teamBSection').className = 'text-center px-4 py-2 rounded-2xl transition-all duration-300 bg-gray-50 opacity-50';
            } else {
                document.getElementById('teamBSection').className = 'text-center px-4 py-2 rounded-2xl transition-all duration-300 bg-red-100 border-b-4 border-red-300';
                document.getElementById('teamASection').className = 'text-center px-4 py-2 rounded-2xl transition-all duration-300 bg-gray-50 opacity-50';
            }
            
            document.getElementById('revealModal').classList.add('hidden');
        }

        function updateScores() {
            document.getElementById('scoreA').innerText = gameData.scores.A;
            document.getElementById('scoreB').innerText = gameData.scores.B;
        }

        function checkWin() {
            const allClicked = gameData.pots.every(p => p.clicked);
            if (allClicked) {
                const winner = gameData.scores.A > gameData.scores.B ? 'TEAM A' : 
                               gameData.scores.B > gameData.scores.A ? 'TEAM B' : 'IT\'S A TIE!';
                document.getElementById('winMessage').innerText = winner === 'IT\'S A TIE!' ? winner : `${winner} WINS!`;
                document.getElementById('winScreen').classList.remove('hidden');
            }
        }

        document.getElementById('btnReveal').onclick = revealStatus;
        document.getElementById('btnWrong').onclick = handleWrong;
        document.getElementById('btnNext').onclick = nextTurn;

        window.onload = initPots;
    </script>
</body>
</html>
